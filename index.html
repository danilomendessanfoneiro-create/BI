<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal BI</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f6f9; }
        header { background: #1f2937; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .login-box { width: 320px; margin: auto; margin-top: 120px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 10px; margin-top: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; margin-top: 15px; background: #2563eb; border: none; color: white; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background: #1d4ed8; }
        iframe { width: 100%; height: calc(100vh - 60px); border: none; }
        #erro { color: red; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login">
        <div class="login-box">
            <h2>Portal BI</h2>
            <p>Dashboard do Cliente</p>
            <input id="usuario" type="text" placeholder="Usuário">
            <input id="senha" type="password" placeholder="Senha">
            <button onclick="login()">Entrar</button>
            <p id="erro"></p>
        </div>
    </div>

    <div id="portal" style="display:none">
        <header>
            <div>Portal BI - Cliente</div>
            <button onclick="logout()" style="width: auto; margin-top: 0; background: #ef4444;">Sair</button>
        </header>
        <iframe id="dashboard" src=""></iframe>
    </div>

    <script>
        function login() {
            // Pegando os valores digitados
            var usuarioDigitado = document.getElementById("usuario").value;
            var senhaDigitada = document.getElementById("senha").value;
            var erroElemento = document.getElementById("erro");

            // LISTA DE USUÁRIOS (Atualize os links aqui)
            const baseUsuarios = {
                "Danilo": { senha: "ABCdef123!", link: "https://app.powerbi.com/view?r=eyJrIjoiNWJjYTgwYzAtNDllNy00YTkxLWE0ZTUtYTE0ZmU3ZWQ4YzAwIiwidCI6IjA5YmY1ZTc3LWY4ZDYtNDBkNS1iMGYyLTFkN2Y1NWRjYzA3YiJ9" },
                "Tamara53786": { senha: "ABCdef123!", link: "COLE_LINK_AQUI" },
                "Edirsabino": { senha: "ABCdef123!", link: "COLE_LINK_AQUI" },
                "GSPrest": { senha: "ABCdef123!", link: "COLE_LINK_AQUI" },
                "HamiltonAdriano": { senha: "ABCdef123!", link: "COLE_LINK_AQUI" },
                "Paulaes": { senha: "ABCdef123!", link: "COLE_LINK_AQUI" },
                "Solution": { senha: "ABCdef123!", link: "COLE_LINK_AQUI" },
                "Tptransporte": { senha: "ABCdef123!", link: "COLE_LINK_AQUI" }
            };

            // Busca o usuário na lista
            const dadosUsuario = baseUsuarios[usuarioDigitado];

            // Validação
            if (dadosUsuario && dadosUsuario.senha === senhaDigitada) {
                // Se estiver ok, coloca o link no iframe e troca de tela
                document.getElementById("dashboard").src = dadosUsuario.link;
                document.getElementById("login").style.display = "none";
                document.getElementById("portal").style.display = "block";
            } else {
                // Se estiver errado, mostra o erro
                erroElemento.innerText = "Usuário ou senha incorretos.";
            }
        }

        function logout() {
            location.reload();
        }
    </script>
</body>
</html>
